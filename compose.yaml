# Axigraph Development Stack
# Run with: docker compose up -d
#
# This configuration runs ALL services in Docker containers (development mode).
# For production deployment, see compose.prod.yaml
#
# SETUP SCRIPTS:
#   Fresh start from clean slate (deletes all data):
#     ./scripts/reset-dev-environment.sh
#
#   Configure Zitadel OIDC after docker compose up:
#     ./scripts/setup-zitadel.sh --update-env
#
#   Full automated setup (starts Docker + configures + recreates containers):
#     ./scripts/setup-zitadel.sh --update-env --docker-init
#
#   Force regenerate client secrets (invalidates existing sessions):
#     ./scripts/setup-zitadel.sh --update-env --force-secrets
#
# After starting, access:
#   - Axigraph API: http://localhost:8000
#   - Zitadel Console: http://localhost:8080/ui/console
#   - MinIO Console: http://localhost:9001
#   - Mailpit (email testing): http://localhost:8025
#
# Default Zitadel admin: admin@axigraph.localhost / Admin123!

services:
  # ============================================================================
  # PostgreSQL Database (shared by Zitadel and Axigraph API)
  # ============================================================================
  postgres:
    image: postgres:17-alpine
    container_name: axigraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGUSER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d zitadel -U postgres && pg_isready -d axigraph -U axigraph"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - axigraph

  # ============================================================================
  # Redis for caching and pub/sub
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: axigraph-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - axigraph

  # ============================================================================
  # MinIO for object storage (ontology files, exports, etc.)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: axigraph-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - axigraph

  # ============================================================================
  # Mailpit (local email testing - catches all outgoing emails)
  # ============================================================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: axigraph-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
    networks:
      - axigraph

  # ============================================================================
  # Zitadel Identity Provider
  # ============================================================================
  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    container_name: axigraph-zitadel
    restart: unless-stopped
    command: 'start-from-init --masterkey "MasterkeyNeedsToHave32Characters"'
    environment:
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALSECURE: false
      ZITADEL_TLS_ENABLED: false

      # Database configuration (using shared postgres)
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable

      # Login V2 client machine user (creates PAT for login container)
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel-data/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: false
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login V2 Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: '2030-01-01T00:00:00Z'

      # Enable Login V2
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: true
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://localhost:8081/ui/v2/login
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://localhost:8081/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://localhost:8081/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: http://localhost:8081/ui/v2/login/login?samlRequest=

      # Admin machine user (creates PAT for API access)
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel-data/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: api-admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: API Admin Machine User
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: '2030-01-01T00:00:00Z'

      # Human admin user
      ZITADEL_FIRSTINSTANCE_ORG_NAME: "Axigraph"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Admin123!

      # SMTP configuration (using Mailpit for local development)
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_HOST: mailpit:1025
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_TLS: "false"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROM: noreply@axigraph.localhost
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROMNAME: Axigraph

      # Debug logging
      ZITADEL_LOG_LEVEL: debug
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: true

    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 10s
    user: "0"
    volumes:
      - zitadel_data:/zitadel-data
    ports:
      - "8080:8080"
      - "8081:3000"
    networks:
      - axigraph
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  # Login V2 - Next.js based login UI
  login:
    image: ghcr.io/zitadel/zitadel-login:latest
    container_name: axigraph-zitadel-login
    restart: unless-stopped
    environment:
      ZITADEL_API_URL: http://localhost:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel-data/login-client.pat
      EMAIL_VERIFICATION: true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const http = require('http'); const req = http.get('http://localhost:3000/ui/v2/login', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.setTimeout(5000, () => { req.destroy(); process.exit(1); });"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    network_mode: service:zitadel
    user: "0"
    volumes:
      - zitadel_data:/zitadel-data:ro
    depends_on:
      zitadel:
        condition: service_healthy
        restart: false

  # ============================================================================
  # Axigraph API (FastAPI backend)
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: axigraph/api:latest
    container_name: axigraph-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-change-in-production
      HOST: 0.0.0.0
      PORT: 8000
      # Database - connects to shared postgres container
      DATABASE_URL: postgresql+asyncpg://axigraph:axigraph@postgres:5432/axigraph
      # Redis
      REDIS_URL: redis://redis:6379/0
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: axigraph
      MINIO_SECURE: "false"
      # Zitadel
      ZITADEL_ISSUER: http://localhost:8080
      ZITADEL_INTERNAL_URL: http://zitadel:8080
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-}
      ZITADEL_CLIENT_SECRET: ${ZITADEL_CLIENT_SECRET:-}
      ZITADEL_SERVICE_TOKEN: ${ZITADEL_SERVICE_TOKEN:-}
      # CORS
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      # Git Repository Storage
      GIT_REPOS_BASE_PATH: /data/repos
      # Superadmin - comma-separated list of Zitadel user IDs with full system access
      SUPERADMIN_USER_IDS: ${SUPERADMIN_USER_IDS:-}
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot reload in development
      - ./app:/home/axigraph/app/app:ro
      # Mount alembic for migrations in development
      - ./alembic:/home/axigraph/app/alembic:ro
      # Git repositories for version control
      - git_repos:/data/repos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - axigraph
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================================
  # ARQ Worker (background task processing)
  # ============================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: axigraph/api:latest
    container_name: axigraph-worker
    restart: unless-stopped
    command: ["arq", "app.worker.WorkerSettings"]
    environment:
      APP_ENV: development
      DEBUG: "true"
      # Database - connects to shared postgres container
      DATABASE_URL: postgresql+asyncpg://axigraph:axigraph@postgres:5432/axigraph
      # Redis
      REDIS_URL: redis://redis:6379/0
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: axigraph
      MINIO_SECURE: "false"
      # Git Repository Storage
      GIT_REPOS_BASE_PATH: /data/repos
    volumes:
      # Mount source code for hot reload in development
      - ./app:/home/axigraph/app/app:ro
      # Git repositories (shared with API)
      - git_repos:/data/repos
    networks:
      - axigraph
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

networks:
  axigraph:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  zitadel_data:
  git_repos:
