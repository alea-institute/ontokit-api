name: Semgrep

on:
  pull_request:
    branches: [dev]
  push:
    branches: [main]
  # Manual run for ad-hoc audits.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Static analysis
    runs-on: ubuntu-latest
    # The official Semgrep image ships the CLI, the Pro engine, and all
    # rule packs preloaded. Pinned to a major tag for reproducibility.
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        env:
          # Optional: when set, `semgrep ci` posts findings to the Semgrep
          # AppSec Platform. When unset, the scan runs in local-only mode
          # and prints findings to the job log. Either path is fine.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep ci \
            --config p/default \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/fastapi \
            --config p/jwt

# Enforcing mode: a failing scan blocks the PR. The baseline was triaged
# in issue #124 (PR #126) — every false positive carries an inline
# `# nosemgrep:` comment with a justification at the call site. New
# suppressions added later should follow the same form.
